name: snakemake_pipeline
channels:
  - bioconda
  - conda-forge
  - r
  - defaults
dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python>=3.10

  # ── QC / Trimming ─────────────────────────────────────────────────────────
  - trim-galore=0.6.10
  - cutadapt>=4.4
  - fastqc=0.12.1
  - multiqc>=1.21

  # ── Alignment & BAM utilities ─────────────────────────────────────────────
  - bowtie2=2.5.3
  - bowtie=1.3.1            # miRDeep2 requires Bowtie 1 (different package)
  - samtools=1.17
  - bedtools=2.31.1
  - htslib=1.17
  - libdeflate>=1.17

  # ── Python data stack ─────────────────────────────────────────────────────
  - pandas>=2.0
  - numpy>=1.24
  - pysam>=0.21
  - matplotlib>=3.7

  # ── miRDeep2 ──────────────────────────────────────────────────────────────
  - mirdeep2>=2.0.1
  - perl>=5.30
  - viennarna>=2.5

  # ── R + Bioconductor ──────────────────────────────────────────────────────
  - r-base>=4.3
  - bioconductor-deseq2>=1.40
  - bioconductor-edger>=3.42
  - bioconductor-apeglm>=1.22
  - bioconductor-complexheatmap
  - r-ggplot2>=3.4
  - r-dplyr>=1.1
  - r-tidyr>=1.3
  - r-readr>=2.1
  - r-pheatmap>=1.0.12
  - r-rcolorbrewer
  - r-ashr
  - r-matrix

  # NOTE: mim-tRNAseq and tRAX are NOT listed here.
  # Both must be installed manually — see README for instructions.
