name: mimseq
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.7
  - mimseq=1.3.9     # pin to latest version
  - vsearch          # NOTE: vsearch is NOT sufficient for mimseq — it does not add
                     # ;size= annotations during clustering, causing the subsequent
                     # usearch -sortbysize call to fail. usearch v11 must be manually
                     # installed (see below). vsearch is kept here as a declared dep
                     # in case mimseq references it elsewhere.
  - gmap             # provides gmap_build and gsnap, required for GSNAP index generation

# ─────────────────────────────────────────────────────────────────────────────
# MANUAL POST-INSTALL STEP: usearch v11 (32-bit, free)
# ─────────────────────────────────────────────────────────────────────────────
# usearch cannot be installed via conda. After creating or rebuilding this env,
# install it manually into the environment's bin/ directory:
#
#   ENV=/datastore/home/s2906787/snakemake_pipeline/.snakemake/conda/930ff50772baf88036a8ee543c7e5ac9
#
#   wget https://drive5.com/downloads/usearch11.0.667_i86linux32.gz
#   gunzip usearch11.0.667_i86linux32.gz
#   chmod +x usearch11.0.667_i86linux32
#   cp usearch11.0.667_i86linux32 $ENV/bin/usearch
#
# Verify with:
#   $ENV/bin/usearch --version
#
# Notes:
#   - This is the 32-bit free binary. The 64-bit version requires a paid licence.
#   - The 32-bit binary works on the HPC (confirmed 2026-06-01) as 32-bit
#     runtime libraries are available on the nodes.
#   - usearch is called by mimseq for -cluster_fast and -sortbysize. It is NOT
#     replaceable by vsearch for this purpose without patching mimseq source.
# ─────────────────────────────────────────────────────────────────────────────
