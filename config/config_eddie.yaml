# =============================================================================
# config/config.yaml
# All tunable parameters and file paths for the tRNA-seq pipeline
# =============================================================================

# ---------------------------------------------------------------------------
# Core paths
# ---------------------------------------------------------------------------
# Pipeline code lives in your workspace; all data/outputs go to scratch.
manifest: "/exports/eddie/scratch/s2906787/snakemake_pipeline/sample_manifest.tsv"
scratch:   "/exports/eddie/scratch/s2906787"

# ---------------------------------------------------------------------------
# Reference paths — all files confirmed present in /scratch/s2906787/references/
# ---------------------------------------------------------------------------
references:
  # -- GRCh38 primary assembly -----------------------------------------------
  genome_fasta:  "/exports/eddie/scratch/s2906787/references/GRCh38.primary_assembly.genome.fa"
  genome_fai:    "/exports/eddie/scratch/s2906787/references/GRCh38.primary_assembly.genome.fa.fai"

  # -- GtRNAdb Hsapi38 files -------------------------------------------------
  # chr-stripped versions for coordinate consistency with Ensembl FASTA
  gtrndb_bed:              "/exports/eddie/scratch/s2906787/references/hg38-tRNAs_nochr.bed"
  # Raw GtRNAdb download (rename the downloaded hg38-tRNAs.fa to this path —
  # see PREREQUISITES note in 00_reference_prep.smk).
  gtrndb_fasta_raw:        "/exports/eddie/scratch/s2906787/references/hg38-tRNAs_raw.fa"
  # Isodecoder-renumbered FASTA actually consumed by rule mimtrnaseq (--trnas).
  # Built by rule fix_isodecoder_numbering from gtrndb_fasta_raw above.
  gtrndb_fasta:            "/exports/eddie/scratch/s2906787/references/hg38-tRNAs.fa"
  gtrndb_mature:           "/exports/eddie/scratch/s2906787/references/hg38-mature-tRNAs.fa"
  gtrndb_filtered:         "/exports/eddie/scratch/s2906787/references/hg38-filtered-tRNAs.fa"
  gtrndb_introns:          "/exports/eddie/scratch/s2906787/references/hg38-tRNA-introns_nochr.bed"
  gtrndb_detailed_out:     "/exports/eddie/scratch/s2906787/references/hg38-tRNAs-detailed.out"
  gtrndb_confidence_out:   "/exports/eddie/scratch/s2906787/references/hg38-tRNAs-confidence-set.out"
  # Standard-format tRNAscan-SE output (9 columns) derived from the detailed
  # file by rule convert_trnascan_out in 00_reference_prep.smk.
  # tRAX maketrnadb.py requires this format; the detailed file has extra
  # columns (HMM Score, Isotype, etc.) that its parser does not recognise.
  gtrndb_standard_out:     "/exports/eddie/scratch/s2906787/references/hg38-tRNAs.out"
  gtrndb_name_map:         "/exports/eddie/scratch/s2906787/references/hg38-tRNAs_name_map.txt"
  # chr-stripped version of the name map (built by rule convert_namemap_nochr).
  # tRAX constructs tRNAscan IDs from the chr-stripped .out file (e.g. 1.trna1);
  # this file keeps the left column in sync so the lookup succeeds.
  gtrndb_name_map_nochr:   "/exports/eddie/scratch/s2906787/references/hg38-tRNAs_name_map_nochr.txt"

  # -- Pre-tRNA reference (built by rule 00a/00b/00c) -----------------------
  pretRNA_fasta:         "/exports/eddie/scratch/s2906787/references/hg38_pretRNA_flanked50.fa"
  pretRNA_fasta_spliced: "/exports/eddie/scratch/s2906787/references/hg38_pretRNA_spliced.fa"
  pretRNA_index:         "/exports/eddie/scratch/s2906787/references/bowtie2_pretRNA/hg38_pretRNA"

  # -- Anticodon lookup table (built by rule 00d) ---------------------------
  # Parsed from new GtRNAdb name format: tRNA-Tyr-GTA-1-1 → GTA
  anticodon_map:  "/exports/eddie/scratch/s2906787/references/hg38_tRNA_anticodon_map.tsv"

  # -- miRBase (human) -------------------------------------------------------
  mirbase_mature_all:  "/exports/eddie/scratch/s2906787/references/mature.fa"
  mirbase_hairpin_all: "/exports/eddie/scratch/s2906787/references/hairpin.fa"
  # Filtered to hsa — built by rule filter_mirbase_human
  mirbase_mature_hsa:  "/exports/eddie/scratch/s2906787/references/mature_hsa.fa"
  mirbase_hairpin_hsa: "/exports/eddie/scratch/s2906787/references/hairpin_hsa.fa"

  # -- mim-tRNAseq (uses its own internal GtRNAdb reference) ----------------
  mimtrnaseq_species: "Hsap"
  mimtrnaseq_genome:  "hg38"

  # -- Bowtie1 genome index (pre-built for miRDeep2 Pass 3) -----------------
  # Built manually — do NOT let miRDeep2 rebuild this per sample
  bowtie1_genome_index: "/exports/eddie/scratch/s2906787/references/bowtie1_GRCh38/hg38"

  # -- TRAX database (built by rule build_trax_db) --------------------------
  trax_ref_dir:  "/exports/eddie/scratch/s2906787/references/trax_hsapi38"

  # -- Ensembl genome annotation (required by tRAX makefeaturebed) ----------
  ensembl_gtf: "/exports/eddie/scratch/s2906787/references/Homo_sapiens.GRCh38.109.gtf.gz"

# ---------------------------------------------------------------------------
# Trim Galore parameters
# ---------------------------------------------------------------------------
trim_galore:
  # Adapter sequences confirmed by direct inspection of raw R2 reads (cutadapt v5.2):
  #   R1: Illumina Universal / P7-side adapter (AGATCGGAAGAGC) — confirmed trimming R1 correctly
  #   R2: RC of Small RNA RA5 5-prime adapter (GATCGTCGGACTGTAGAACTCTGAAC) — confirmed present
  #       in R2 reads at the 3-prime end; replaces the previous incorrect value
  #       (TGGAATTCTCGGGTGCCAAGG / RA3) which was the R2 5-prime adapter and
  #       therefore untrimmable by Trim Galore's 3-prime-only adapter2 mode.
  adapter_r1:   "AGATCGGAAGAGC"
  adapter_r2:   "GATCGTCGGACTGTAGAACTCTGAAC"
  min_length:   12      # retain tRFs (minimum 12 nt)
  quality:      20      # Phred Q20 5-prime quality trimming
  cores:        8       # cutadapt threads per sample

# ---------------------------------------------------------------------------
# mim-tRNAseq (Pass 1) parameters
# ---------------------------------------------------------------------------
mimtrnaseq:
  threads:        8
  min_cov:        2       # minimum read coverage to retain a cluster
  max_multi:      4       # maximum multimappers
  cluster_id:     0.97    # isodecoder clustering identity threshold (97%)
  snp_tolerance:  0.1     # misincorporation rate threshold for modification inference

# ---------------------------------------------------------------------------
# Bowtie2 (Pass 2 — pre-tRNA) parameters
# ---------------------------------------------------------------------------
bowtie2:
  threads:    8
  preset:     "--end-to-end --sensitive"
  # Allow up to 20 alignments to capture multi-mapping pre-tRNA reads
  max_align:  20

# ---------------------------------------------------------------------------
# miRDeep2 (Pass 3) parameters
# ---------------------------------------------------------------------------
mirdeep2:
  threads:  4

# ---------------------------------------------------------------------------
# TRAX parameters
# ---------------------------------------------------------------------------
trax:
  # Path to the cloned tRAX repository — scripts are called by full path
  # because tRAX is not a conda/pip package; only its dependencies are in
  # trax_env.yaml.  Clone with:
  #   git clone https://github.com/UCSC-LoweLab/tRAX.git /datastore/home/s2906787/tRAX
  script_dir:     "/exports/eddie3_homes_local/s2906787/tRAX"
  threads:        16    # FIX 9 (2026-06-18): raised 8->16. With 15 samples/cell
                         # line, --cores 8 forced TRAX's internal mapping step to
                         # run samples in two sequential waves (8, then 7). Each
                         # bowtie2 call inside TRAX is single-threaded (-p 1);
                         # TRAX's only parallelism lever is running more samples
                         # concurrently via --cores. 16 lets all 15 samples map
                         # in a single wave. Matched with sge_extra in
                         # 07_trax.smk: -pe sharedmem 16. Eddie nodes are 32-128
                         # core; 16 slots is a small fraction, no queue risk.
  min_unique_cov: 3    # discard tRFs with < 3 uniquely-mapping reads (proposal 3.8)

# ---------------------------------------------------------------------------
# QC thresholds (used by downstream QC summary rule)
# ---------------------------------------------------------------------------
qc_thresholds:
  min_cca_concordance:  0.70   # target ≥70% of Pass 1 reads passing CCA filter
  min_replicate_r:      0.95   # Pearson r target within condition groups
  max_mirna_fraction:   0.20   # flag libraries with >20% miRNA reads
  min_pos34_coverage:   10     # min median read depth at wobble position 34; below → flag_low_mismatch_cov=WARN

# ---------------------------------------------------------------------------
# Computational resources — single source of truth for SGE memory/slot/
# runtime tuning. Every value here is read by the corresponding rule via
# the sge_extra() helper in the Snakefile. No .smk file should need
# editing to fix an OOM kill, a wall-clock timeout, or to change how many
# parallel SGE slots a rule requests — edit the values below instead.
#
# Per-rule fields:
#   slots:        number of SGE "sharedmem" PE slots to request. Only set
#                 above 1 when the rule's underlying tool genuinely
#                 parallelises across multiple threads/processes (matches
#                 the rule's own `threads:` value in that case). Omitted
#                 (defaults to 1) for effectively single-threaded tools —
#                 requesting unused slots only wastes cluster allocation.
#   vmem_mb:      per-slot virtual memory limit (SGE h_vmem), in MB.
#                 TOTAL memory budget granted to the job = slots * vmem_mb.
#   runtime_min:  wall-clock time limit, in minutes.
#
# IMPORTANT: do not add `sge_pe: "sharedmem"` to any rule's resources block.
# snakemake-executor-plugin-sge derives sge_pe's slot count from the OUTER
# snakemake invocation's --cores value (not the rule's own threads:), and
# the EDDIE profile is invoked with --cores 1 — so sge_pe silently
# collapses every job to a single SGE slot regardless of how many
# threads/processes it actually launches. This caused undiagnosed OOM
# kills in trim_galore, bowtie2_pretRNA, and trax_quantify; mimtrnaseq and
# build_bowtie2_pretRNA_index are pre-emptively fixed below for the same
# reason, since both genuinely run multi-threaded tools. Always request
# slots via "slots:" here instead — never sge_pe.
#
# NOTE: the previous version of this section had flat *_mem_mb keys
# (trim_mem_mb, mim_mem_mb, bowtie2_mem_mb, cca_filter_mem_mb,
# mirdeep2_mem_mb, trax_mem_mb, read_assignment_mem_mb) that were never
# actually read by any rule — the .smk files had their own hardcoded
# h_vmem literals instead, and several had drifted out of sync with these
# unused config values (e.g. mim_mem_mb said 64000 while the rule actually
# requested 8000M; trax_mem_mb said 16000 while the rule actually
# requested 128000M total across 16 slots). The values below are pulled
# from what the rules actually request today, not from the old stale keys.
# default_threads / default_mem_mb are removed for the same reason — they
# were never consumed anywhere either; the EDDIE profile's own
# default-resources (set outside this file) already cover the fallback
# case for any rule with no entry here.
# ---------------------------------------------------------------------------
resources:

  build_bowtie2_pretRNA_index:
    slots:        8       # matches bowtie2.threads — bowtie2-build is genuinely multi-threaded
    vmem_mb:      4000
    runtime_min:  60

  trim_galore:
    slots:        8       # matches trim_galore.cores — Trim Galore launches N parallel cutadapt/dnaio workers
    vmem_mb:      4000
    runtime_min:  120

  fastqc_post_trim:
    slots:        1       # FastQC runs on a single file per job; --threads has no effect here despite threads:2 in the rule
    vmem_mb:      6000
    runtime_min:  60

  mimtrnaseq:
    slots:        8       # matches mimtrnaseq.threads — GSNAP alignment (via mim-tRNAseq) is genuinely multi-threaded
    vmem_mb:      16000
    runtime_min:  480

  cca_anticodon_filter:
    slots:        1       # single-threaded pysam script (threads: 1 in the rule)
    vmem_mb:      64000
    runtime_min:  240

  bowtie2_pretRNA:
    slots:        8       # matches bowtie2.threads — bowtie2 -p N is genuinely multi-threaded
    vmem_mb:      4000
    runtime_min:  480

  mirdeep2_pass3:
    slots:        1       # mapper.pl / quantifier.pl are effectively single-threaded despite mirdeep2.threads
    vmem_mb:      6000
    runtime_min:  120

  trax_map_sample:
    slots:        1       # bowtie2 is hardcoded -p 1 by TRAX — genuinely single-threaded
    vmem_mb:      8000    # generous for one sample's bowtie2 + choosemappings.py
    runtime_min:  8640    # 6 days per sample. Raised from 4320 (72h) on 2026-07-02:
                          # 7 THP1 samples (c2_2, c4_1, c4_2, p2_3, p4_1, p4_2, p4_3)
                          # hit the 72h wall mid-bowtie2 with no error output — SGE
                          # walltime kill, not a script failure. THP1_c2_2 alone had
                          # 257,930,880 reads (~258M), confirming the original "300M
                          # reads / ~55h" estimate in FIX 10 was optimistic for
                          # -k 100 --very-sensitive at single-threaded (-p 1).
                          # FIX 10 (2026-06-29): split from trax_quantify to give each
                          # sample its own SGE job and independent wall-clock budget.

  trax_quantify:
    slots:        8       # FIX 10: analysis-only phase (--lazyremap, no mapping).
                          # 8 cores for TRAX's counting + R analysis steps.
                          # Reduced from 16 (mapping wave parallelism no longer needed
                          # here — that's handled per-sample by trax_map_sample).
                          # 8 slots × 8000M = 64G total RSS budget.
    vmem_mb:      8000
    runtime_min:  1440    # 24h — raised from 480 (8h) on 2026-07-09. THP1 quantify
                          # (jobid 239, SGE task 56657549.2) hit the 8h h_rt wall
                          # mid-"Counting Reads" (qacct: failed=44 execd enforced
                          # h_rt limit, exit_status=137, wallclock=28800.196s —
                          # i.e. killed within 0.2s of the 480 min limit). A549
                          # completed the same analysis-only phase in < 2h, so THP1
                          # needed meaningfully longer with the same sample count;
                          # 24h gives generous headroom without pinpointing exactly
                          # where it would have finished. If THP1 completes well
                          # under 24h once rerun, consider tightening this back down
                          # using the actual observed runtime rather than leaving
                          # 24h as a permanent guess.

  build_read_assignment_summary:
    slots:        1
    vmem_mb:      2000
    runtime_min:  30
